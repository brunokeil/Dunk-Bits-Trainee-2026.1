<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal</title>
    <link rel="stylesheet" href="/public/css/modais-usuarios.css" />
  </head>
  <body>
    <div class="userExample">
      <h2>Lorem Ypsum Bits JR</h2>
      <div class="modalButtons" id="modalHead">
        <button id="viewUser">Visualizar</button>
        <button id="newUser">Criar</button>
        <button id="editUser">Editar</button>
        <button id="deleteUser">Excluir</button>
      </div>
    </div>
    
    <div class="modal-container close">
      
    <div class="modalUser" id="viewModal">
      <span id="header">
        <h1>PERFIL DE USUÁRIO</h1>
        <button class="closeModalBtn">X</button>
      </span>
      <div id="userProfilePicture"><img src="link" /></div>
        <div class="userInfo">
          <input
            type="text"
            class="usernameInput"
            placeholder="Username"
            value="joaosilva"
            disabled
          />
          <input
            type="text"
            class="emailInput"
            placeholder="E-mail"
            value="joaosilva@gmail.com"
            disabled
          />
          <input
            type="password"
            class="passwordInput"
            placeholder="Senha"
            value="senha"
            disabled
            
          />
        </div>
    </div>

    <div class="modalUser" id="createModal">
      <span id="header">
        <h1>CRIAR USUÁRIO</h1>
        <button class="closeModalBtn">X</button>
      </span>
      <div id="userProfilePicture"><img src="link" /></div>
      <div class="userInfo">
        <input type="text" class="usernameInput" placeholder="Username" />
        <input type="text" class="emailInput" placeholder="E-mail" />
        <input type="password" class="passwordInput" placeholder="Senha" />
      </div>
      <div class="footerButtons">
        <button class="closeModalBtn cancelBtn">CANCELAR</button>
        <button>CRIAR</button>
      </div>
    </div>
    
    <div class="modalUser" id="editModal">
      <span id="header">
        <h1>EDITAR USUÁRIO</h1>
        <button class="closeModalBtn">X</button>
      </span>
      <div id="userProfilePicture"><img src="link" /></div>
      <div class="userInfo">
        <input
          type="text"
          class="usernameInput"
          placeholder="Username"
          value="joaosilva"
        />
        <input
          type="text"
          class="emailInput"
          placeholder="E-mail"
          value="joaosilva@gmail.com"
        />
        <input
          type="password"
          class="passwordInput"
          placeholder="Senha"
          value="senha"
        />
      </div>
      <div class="footerButtons">
        <button class="closeModalBtn cancelBtn">CANCELAR</button>
        <button>SALVAR ALTERAÇÕES</button>
      </div>
    </div>
    

    <div class="modalUser" id="deleteModal">
      <span>
        <h1>Excluir usuário?</h1>
      </span>
      <p>
        Tem certeza que deseja excluir este usuário? <br /> <br/>
        Essa ação é <em>irreversível</em> e todos os dados relacionados à conta serão <em>
          removidos
          permanentemente
        </em>.
      </p>
      <div class="footerButtons">
        <button class="closeModalBtn cancelBtn">CANCELAR</button>
        <button>EXCLUIR</button>
      </div>
    </div>
    </body>
  </div>
  <script src="/public/js/modais-usuarios.js"></script>
</html>
