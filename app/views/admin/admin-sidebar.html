<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dunk Bit's Sidebar</title>
    <link rel="icon" href="/public/assets/Logo_dunkbits.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/public/css/sidebar.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="top-sidebar">
        <div class="top-top-sidebar">
          <div class="setinha">
            <button id="toggle-sidebar-btn">
              <img id="setinha" src="/public/assets/ArrowLeft.svg" />
            </button>
          </div>
          <div class="user-space-sidebar">
            <img id="user-icon" src="/public/assets/PersonCircle.svg" />
            <div>
              <p id="user-name">Lorem Ipsum</p>
              <p id="cargo">Adm</p>
            </div>
          </div>
        </div>
        <div class="admin-sidebar">
          <p>Admin</p>
          <nav class="content-sidebar">
            <ul>
              <li>
                <a href="#">
                  <span class="item-sidebar">
                    <img id="chevette" src="/public/assets/chevette-left.svg" />
                    Voltar à Página Inicial
                  </span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span class="item-sidebar">
                    <img id="chevette" src="/public/assets/chevette-left.svg" />
                    Acessar Dashboard
                  </span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span class="item-sidebar">
                    <img id="chevette" src="/public/assets/chevette-left.svg" />
                    Gerenciar Posts
                  </span>
                </a>
              </li>
              <li>
                <a href="#">
                  <span class="item-sidebar">
                    <img id="chevette" src="/public/assets/chevette-left.svg" />
                    Gerenciar Usuários
                  </span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
      <div class="logout-sidebar">
        <button type="button" id="logout-btn">
          Sair
        </button>
      </div>
    </aside>
    <main>

      <h1>PÁGINA FODA MUITO FODA UAU</h1>
    </main>
  </body>
  <script src="/public/js/sidebar.js"></script>
</html>
