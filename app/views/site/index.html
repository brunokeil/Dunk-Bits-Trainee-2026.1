<!DOCTYPE html>
    <html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500&display=swap" rel="stylesheet">    
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NAVBAR</title>
        <link rel="stylesheet" href="../../../public/css/styles1.css">
    </head>

    <body class="telaNavbar">
        <header class="headerNavbar">
            <img src="../../../public/assets/Logo5.png" alt="Logo da Empresa" class="Logo5">
            <nav class="menu">
                <a href="#" class="buttonHome">HOME</a>
                <a href="#" class="buttonPublicacoes">PUBLICAÇÕES</a>
                <a href="#" class="buttonLogin">LOGIN</a>
            </nav>

            <div class="hamburguer" id="buttonMenuMobile">
                <ion-icon name="menu-outline"></ion-icon>
            </div>
        </header>

        <nav class="menu-mobile" id="telaMenuMobile">
            <img src="../../../public/assets/Logo5.png" alt="Logo da Empresa" class="logoMobile">
            
            <a href="#" class="buttonHome">HOME</a>
            <a href="#" class="buttonPublicacoes">PUBLICAÇÕES</a>
            <a href="#" class="buttonLogin">LOGIN</a>

            <div class="buttonFecharMenu" id="buttonFecharMenu">
                <ion-icon name="close-outline"></ion-icon>
            </div>
        </nav>

        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
        
        <script>
            const btnAbrir = document.getElementById('buttonMenuMobile');
            const btnFechar = document.getElementById('buttonFecharMenu');
            const menuOverlay = document.getElementById('telaMenuMobile');

            btnAbrir.addEventListener('click', () => {
                menuOverlay.classList.add('aberto');
            });

            btnFechar.addEventListener('click', () => {
                menuOverlay.classList.remove('aberto');
            });
        </script>
    </body>
    </html>
